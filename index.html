<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Request Inspector — insecure.co.nz</title>

  <!--
    Tailwind CDN — note for self-hosters:
    The CDN build generates CSS at runtime and requires 'unsafe-eval' in your CSP.
    For a self-hosted deployment replace this with a Tailwind CLI build:
      npx tailwindcss -i ./input.css -o ./output.css --minify
    See: https://tailwindcss.com/docs/installation
  -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Tooltip for header-storage risk disclosure */
    [data-tooltip] { position: relative; }
    [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: #e2e8f0;
      font-size: 0.7rem;
      line-height: 1.4;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: pre-wrap;
      width: 240px;
      z-index: 50;
      pointer-events: none;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
    }
  </style>
</head>
<body>
<div id="root"></div>

<!--
  Runtime: Preact 10 + htm (replaces Babel standalone — issue #9 fix)

  Why Preact + htm?
    • No build step required — works directly in the browser
    • htm provides JSX-like template literals; Preact is React-API-compatible
    • Total payload ≈ 10 KB gzipped vs. ≈ 330 KB for babel-standalone

  SRI (Subresource Integrity) — issue #10 note for self-hosters:
    Modules are pinned to exact versions so content is stable.
    To compute SRI hashes for an air-gapped or stricter deployment:

      curl -sL https://esm.sh/preact@10.23.2          | openssl dgst -sha384 -binary | openssl base64 -A
      curl -sL https://esm.sh/preact@10.23.2/hooks    | openssl dgst -sha384 -binary | openssl base64 -A
      curl -sL https://esm.sh/htm@3.1.1               | openssl dgst -sha384 -binary | openssl base64 -A

    Then add integrity="sha384-<hash>" crossorigin="anonymous" to each import map entry.
    See: https://developer.mozilla.org/en-US/docs/Web/Security/Subresource_Integrity
-->
<script type="module" src="/app.js"></script>
</body>
</html>
